    <style>

        .download-layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;

        }

        /* Moldura retrô para a foto/ícone do arquivo */
        .preview-box {

        }

        .preview-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Área de texto e informações do arquivo */
        .info-box {
            flex-grow: 1;
        }

        .file-details {
            margin-top: 15px;
            padding: 8px;
            background-color: #f0f0f0;
            border: 1px dashed #808080;
            font-size: 13px;
        }

        /* Alinhamento do grande botão de download */
        .action-container {
            margin-top: 25px;
            text-align: right;
            border-top: 2px solid #c0c0c0;
            padding-top: 15px;
        }
