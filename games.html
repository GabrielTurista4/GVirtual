<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games - GVirtual</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Container em Grade (Grid) para organizar linhas e colunas */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 15px;
            text-align: center;
        }

        .image-link-container {
            display: inline-block;
        }

        /* Moldura retrô ao redor da imagem */
        .retro-image {
            border: 2px solid #808080;
            border-top: 2px solid #000000;
            border-left: 2px solid #000000;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            padding: 2px;
            background-color: #c0c0c0;
            width: 100%;
            max-width: 120px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Efeito de clique invertendo a borda */
        .image-link-container a:active .retro-image {
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #808080;
            border-bottom: 2px solid #808080;
        }
    </style>
</head>
<body>

    <!-- Barra Superior -->
    <header class="navbar">
        <div class="navbar-title">GVirtual</div>
        <div class="navbar-buttons">
            <a href="https://gabrielturista4.github.io/GVirtual/" class="btn">Back</a>
        </div>
    </header>

    <!-- Janela do Windows -->
    <main class="content-container">
        
        <div class="window-title-bar"></div>

        <div class="window-body">
            <h1>Games:</h1>
            
            <div class="games-grid">
                <!-- Jogo 1: GED3 -->
                <div class="image-link-container">
                    <a href="ged3.html" target="_blank">
                        <img src="ged3.png" alt="GED3" class="retro-image">
                    </a>
                </div>

                <!-- Jogo 2: Pong Advanced -->
                <div class="image-link-container">
                    <a href="pongadvanced.html" target="_blank">
                        <img src="pongadvanced.png" alt="Pong Advanced" class="retro-image">
                    </a>
                </div>
            </div>
        </div>

    </main>

</body>
</html>
