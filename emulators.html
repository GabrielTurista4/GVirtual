<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emulators - GVirtual</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Layout centralizado para o emulador */
        .emulator-container {
            text-align: center;
            margin-top: 20px;
        }

        /* Moldura de sistema ao redor do bloco da imagem */
        .retro-image-box {
            border: 2px solid #808080;
            border-top: 2px solid #000000;
            border-left: 2px solid #000000;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            padding: 4px;
            background-color: #c0c0c0;
            display: inline-block;
            max-width: 250px;
            transition: transform 0.1s ease;
        }

        .retro-image-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Efeito clássico de clique "afundando" o bloco inteiro */
        .emulator-container a:active .retro-image-box {
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #808080;
            border-bottom: 2px solid #808080;
        }

        /* Texto abaixo da imagem */
        .emulator-text {
            margin-top: 15px;
            font-size: 14px;
            line-height: 1.4;
            color: #000000;
        }
    </style>
</head>
<body>

    <!-- Barra Superior -->
    <header class="navbar">
        <div class="navbar-title">GVirtual</div>
        <div class="navbar-buttons">
            <!-- Volta direto para a index.html -->
            <a href="https://gabrielturista4.github.io/GVirtual/" class="btn">Back</a>
        </div>
    </header>

    <!-- Janela Principal -->
    <main class="content-container">
        
        <!-- Faixa azul lisa clássica -->
        <div class="window-title-bar"></div>

        <!-- Corpo branco -->
        <div class="window-body">
            <h1>Emulators:</h1>
            
            <div class="emulator-container">
                <!-- Link que redireciona para o download ou site do emulador -->
                <a href="gp367.html">
                    <div class="retro-image-box">
                        <!-- Imagem do emulador ou console -->
                        <img src="gp367.png" alt="Emulator Preview">
                    </div>
                </a>

                <!-- Texto posicionado exatamente embaixo da imagem -->
                <div class="emulator-text">
                    <p><strong>GP367</strong></p>
                    <p>Use This Software To Play GPA Games.</p>
                </div>
            </div>
        </div>

    </main>

</body>
</html>
